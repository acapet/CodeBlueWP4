# mkdocs.yml

site_name: CodeBlue WP4
site_url: https://acapet.github.io/CodeBlueWP4/
theme:
  name: material

markdown_extensions:
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js


nav:
  - Home: index.md
  - Annual indicators : indicators.md
  - Monthly layers: monthly_layers.md
  - Daily layers: daily_layers.md
  - Stations: stations.md
  - Validation tables : validation_tables.md
